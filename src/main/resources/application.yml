# ==============================================================================
# KisanConnect — Base Configuration
# ==============================================================================

spring:
  application:
    name: KisanConnect

  # Virtual threads for blocking I/O (Spring Boot 3.2+)
  threads:
    virtual:
      enabled: true

  # Jackson defaults
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  # Flyway — disabled by default, enabled per profile
  flyway:
    enabled: false

  # JPA defaults
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

# ==============================================================================
# Server
# ==============================================================================
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# ==============================================================================
# Actuator
# ==============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# ==============================================================================
# SpringDoc OpenAPI
# ==============================================================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ==============================================================================
# Spring AI — Groq (FREE, OpenAI-compatible API)
# ==============================================================================
spring.ai:
  openai:
    base-url: https://api.groq.com/openai
    api-key: ${GROQ_API_KEY:}
    chat:
      options:
        model: llama-3.1-8b-instant
        temperature: 0.7
        max-tokens: 512

# ==============================================================================
# KisanConnect — Application Settings
# ==============================================================================
kisanconnect:
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    bot-username: ${TELEGRAM_BOT_USERNAME:KisanVoiceBot}
  huggingface:
    api-key: ${HUGGINGFACE_API_KEY:}
    stt-model: whisper-large-v3-turbo
    tts-model: ai4bharat/indic-parler-tts
    translation:
      indic-to-en: ai4bharat/indictrans2-indic-en-dist-200M
      en-to-indic: ai4bharat/indictrans2-en-indic-dist-200M

# ==============================================================================
# Caching (Caffeine)
# ==============================================================================
spring.cache:
  type: caffeine
  caffeine:
    spec: maximumSize=500,expireAfterWrite=3600s
