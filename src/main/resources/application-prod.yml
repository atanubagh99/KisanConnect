# ==============================================================================
# KisanConnect — Production Profile
# ==============================================================================

spring:
  # PostgreSQL
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/kisanconnect}
    username: ${DATABASE_USERNAME:kisanconnect}
    password: ${DATABASE_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  # JPA — validate schema against Flyway migrations
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  # Flyway enabled in production
  flyway:
    enabled: true
    baseline-on-migrate: true

  # Spring AI
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}

# ==============================================================================
# Actuator — restricted in production
# ==============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never

# ==============================================================================
# Logging — production-level
# ==============================================================================
logging:
  level:
    root: WARN
    com.kisanconnect: INFO
    org.springframework.web: WARN
